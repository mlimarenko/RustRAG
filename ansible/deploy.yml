---
# Target: docker + compose v2 + curl. Runs install.sh from GitHub; rerun upgrades.
# Common -e: rustrag_install_dir, rustrag_release, rustrag_public_host, rustrag_publish_port, rustrag_become, rustrag_install_script_url (override URL, e.g. file://…/install.sh).
- name: RustRAG — install or update via official GitHub script
  hosts: all
  gather_facts: false

  vars:
    rustrag_install_dir: /opt/rustrag
    rustrag_github_repo: mlimarenko/RustRAG
    rustrag_install_script_ref: master
    rustrag_release: latest
    rustrag_public_host: ""
    rustrag_publish_port: ""
    rustrag_install_script_url: >-
      https://raw.githubusercontent.com/{{ rustrag_github_repo }}/{{ rustrag_install_script_ref }}/install.sh
    rustrag_access_host: >-
      {{ rustrag_public_host | default(ansible_host | default(inventory_hostname), true) }}

  become: "{{ rustrag_become | default(true) | bool }}"

  tasks:
    - name: Fail fast — Docker must be installed and usable
      ansible.builtin.command: docker info
      changed_when: false

    - name: Fail fast — Docker Compose v2 plugin must be available
      ansible.builtin.command: docker compose version
      changed_when: false

    - name: Fail fast — curl is required (install script and downloads)
      ansible.builtin.command: curl --version
      changed_when: false

    - name: Run official install.sh from GitHub (deploy or update stack)
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          curl -fsSL "{{ rustrag_install_script_url }}" | bash -s -- "{{ rustrag_release }}" "{{ rustrag_install_dir }}"
        executable: /bin/bash
      environment:
        RUSTRAG_GITHUB_REPOSITORY: "{{ rustrag_github_repo }}"
        RUSTRAG_PORT: "{{ rustrag_publish_port }}"
      register: rustrag_install

    - name: Read .env for access hints
      ansible.builtin.slurp:
        src: "{{ rustrag_install_dir }}/.env"
      register: rustrag_env_slurp

    - name: Parse .env lines for hints
      ansible.builtin.set_fact:
        rustrag_env_lines: "{{ (rustrag_env_slurp.content | b64decode).splitlines() }}"

    - name: Resolve published HTTP port
      ansible.builtin.set_fact:
        rustrag_ui_port: >-
          {{
            (
              rustrag_env_lines
              | select('match', '^RUSTRAG_PORT=')
              | list
              | first
              | default('RUSTRAG_PORT=19000', true)
            )
            | regex_replace('^RUSTRAG_PORT=', '')
            | trim
            | default('19000', true)
          }}

    - name: Detect non-empty pre-provisioned admin password in .env
      ansible.builtin.set_fact:
        rustrag_bootstrap_password_configured: >-
          {{
            rustrag_env_lines
            | select('match', '^RUSTRAG_UI_BOOTSTRAP_ADMIN_PASSWORD=')
            | map('regex_replace', '^RUSTRAG_UI_BOOTSTRAP_ADMIN_PASSWORD=', '')
            | map('trim')
            | reject('equalto', '')
            | list
            | length > 0
          }}

    - name: Detect any LLM API key in .env
      ansible.builtin.set_fact:
        rustrag_llm_key_configured: >-
          {{
            (
              rustrag_env_lines
              | select('match', '^(RUSTRAG_OPENAI_API_KEY|RUSTRAG_DEEPSEEK_API_KEY|RUSTRAG_QWEN_API_KEY)=')
              | map('regex_replace', '^(RUSTRAG_OPENAI_API_KEY|RUSTRAG_DEEPSEEK_API_KEY|RUSTRAG_QWEN_API_KEY)=', '')
              | map('trim')
              | reject('equalto', '')
              | list
              | length > 0
            )
          }}

    - name: Detect fresh .env secrets from this install.sh run
      ansible.builtin.set_fact:
        rustrag_fresh_stack_secrets: "{{ 'New .env:' in (rustrag_install.stdout | default('')) }}"

    - name: Build post-deploy summary (Ansible)
      ansible.builtin.set_fact:
        rustrag_post_deploy_lines: >-
          {{
            [
              '---',
              'UI: http://' ~ rustrag_access_host ~ ':' ~ rustrag_ui_port ~ '/',
              'MCP: http://' ~ rustrag_access_host ~ ':' ~ rustrag_ui_port ~ '/v1/mcp',
              'Dir: ' ~ rustrag_install_dir ~ '/',
              'Stack secrets:',
            ]
            + (
              [ '  New .env (random DB/bootstrap token in .env).' ]
              if rustrag_fresh_stack_secrets | bool
              else [ '  Existing .env unchanged.' ]
            )
            + [ 'Admin:', ]
            + (
              [ '  In .env: RUSTRAG_UI_BOOTSTRAP_ADMIN_*.' ]
              if rustrag_bootstrap_password_configured | bool
              else [ '  Not in .env: UI on first visit.' ]
            )
            + [ 'LLM:', ]
            + (
              [ '  Provider key(s) in .env.' ]
              if rustrag_llm_key_configured | bool
              else [ '  Add RUSTRAG_*_API_KEY or UI.' ]
            )
            + [ '---' ]
          }}

    - name: Show install.sh stdout
      ansible.builtin.debug:
        msg: "{{ rustrag_install.stdout_lines | default([]) }}"

    - name: Show Ansible summary
      ansible.builtin.debug:
        msg: "{{ rustrag_post_deploy_lines }}"
