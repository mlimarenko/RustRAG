---
# Target: docker + compose v2 + curl. Runs install.sh from GitHub; rerun upgrades.
# Common -e: ironrag_install_dir, ironrag_release, ironrag_public_host, ironrag_publish_port, ironrag_become, ironrag_install_script_url (override URL, e.g. file://…/install.sh).
- name: IronRAG — install or update via official GitHub script
  hosts: all
  gather_facts: false

  vars:
    ironrag_install_dir: /opt/ironrag
    ironrag_github_repo: mlimarenko/IronRAG
    ironrag_install_script_ref: master
    ironrag_release: latest
    ironrag_public_host: ""
    ironrag_publish_port: ""
    ironrag_install_script_url: >-
      https://raw.githubusercontent.com/{{ ironrag_github_repo }}/{{ ironrag_install_script_ref }}/install.sh
    ironrag_access_host: >-
      {{ ironrag_public_host | default(ansible_host | default(inventory_hostname), true) }}

  become: "{{ ironrag_become | default(true) | bool }}"

  tasks:
    - name: Fail fast — Docker must be installed and usable
      ansible.builtin.command: docker info
      changed_when: false

    - name: Fail fast — Docker Compose v2 plugin must be available
      ansible.builtin.command: docker compose version
      changed_when: false

    - name: Fail fast — curl is required (install script and downloads)
      ansible.builtin.command: curl --version
      changed_when: false

    - name: Run official install.sh from GitHub (deploy or update stack)
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          curl -fsSL "{{ ironrag_install_script_url }}" | bash -s -- "{{ ironrag_release }}" "{{ ironrag_install_dir }}"
        executable: /bin/bash
      environment:
        IRONRAG_GITHUB_REPOSITORY: "{{ ironrag_github_repo }}"
        IRONRAG_PORT: "{{ ironrag_publish_port }}"
      register: ironrag_install

    - name: Read .env for access hints
      ansible.builtin.slurp:
        src: "{{ ironrag_install_dir }}/.env"
      register: ironrag_env_slurp

    - name: Parse .env lines for hints
      ansible.builtin.set_fact:
        ironrag_env_lines: "{{ (ironrag_env_slurp.content | b64decode).splitlines() }}"

    - name: Resolve published HTTP port
      ansible.builtin.set_fact:
        ironrag_ui_port: >-
          {{
            (
              ironrag_env_lines
              | select('match', '^IRONRAG_PORT=')
              | list
              | first
              | default('IRONRAG_PORT=19000', true)
            )
            | regex_replace('^IRONRAG_PORT=', '')
            | trim
            | default('19000', true)
          }}

    - name: Detect non-empty pre-provisioned admin password in .env
      ansible.builtin.set_fact:
        ironrag_bootstrap_password_configured: >-
          {{
            ironrag_env_lines
            | select('match', '^IRONRAG_UI_BOOTSTRAP_ADMIN_PASSWORD=')
            | map('regex_replace', '^IRONRAG_UI_BOOTSTRAP_ADMIN_PASSWORD=', '')
            | map('trim')
            | reject('equalto', '')
            | list
            | length > 0
          }}

    - name: Detect any LLM API key in .env
      ansible.builtin.set_fact:
        ironrag_llm_key_configured: >-
          {{
            (
              ironrag_env_lines
              | select('match', '^(IRONRAG_OPENAI_API_KEY|IRONRAG_DEEPSEEK_API_KEY|IRONRAG_QWEN_API_KEY)=')
              | map('regex_replace', '^(IRONRAG_OPENAI_API_KEY|IRONRAG_DEEPSEEK_API_KEY|IRONRAG_QWEN_API_KEY)=', '')
              | map('trim')
              | reject('equalto', '')
              | list
              | length > 0
            )
          }}

    - name: Detect fresh .env secrets from this install.sh run
      ansible.builtin.set_fact:
        ironrag_fresh_stack_secrets: "{{ 'New .env:' in (ironrag_install.stdout | default('')) }}"

    - name: Build post-deploy summary (Ansible)
      ansible.builtin.set_fact:
        ironrag_post_deploy_lines: >-
          {{
            [
              '---',
              'UI: http://' ~ ironrag_access_host ~ ':' ~ ironrag_ui_port ~ '/',
              'MCP: http://' ~ ironrag_access_host ~ ':' ~ ironrag_ui_port ~ '/v1/mcp',
              'Dir: ' ~ ironrag_install_dir ~ '/',
              'Stack secrets:',
            ]
            + (
              [ '  New .env (random DB/bootstrap token in .env).' ]
              if ironrag_fresh_stack_secrets | bool
              else [ '  Existing .env unchanged.' ]
            )
            + [ 'Admin:', ]
            + (
              [ '  In .env: IRONRAG_UI_BOOTSTRAP_ADMIN_*.' ]
              if ironrag_bootstrap_password_configured | bool
              else [ '  Not in .env: UI on first visit.' ]
            )
            + [ 'LLM:', ]
            + (
              [ '  Provider key(s) in .env.' ]
              if ironrag_llm_key_configured | bool
              else [ '  Add IRONRAG_*_API_KEY or UI.' ]
            )
            + [ '---' ]
          }}

    - name: Show install.sh stdout
      ansible.builtin.debug:
        msg: "{{ ironrag_install.stdout_lines | default([]) }}"

    - name: Show Ansible summary
      ansible.builtin.debug:
        msg: "{{ ironrag_post_deploy_lines }}"
