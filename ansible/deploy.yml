---
- name: Deploy RustRAG compose stack to target host
  hosts: all
  gather_facts: false
  vars:
    ci_project_dir: "{{ lookup('env', 'CI_PROJECT_DIR') | default(playbook_dir | dirname, true) }}"
    deploy_path: "{{ lookup('env', 'DEPLOY_PATH') | default('/opt/docker/rustrag', true) }}"
    compose_file: "{{ lookup('env', 'COMPOSE_FILE') | default(deploy_path ~ '/docker-compose-gitlab.yml', true) }}"
    env_file: "{{ lookup('env', 'ENV_FILE') | default(deploy_path ~ '/.env', true) }}"
    image_env_file: "{{ lookup('env', 'IMAGE_ENV_FILE') | default(deploy_path ~ '/.images.env', true) }}"
    compose_project: "{{ lookup('env', 'APP_COMPOSE_PROJECT') | default('rustrag', true) }}"
    backend_image: "{{ lookup('env', 'RUSTRAG_BACKEND_DEPLOY_IMAGE') | default('', true) }}"
    frontend_image: "{{ lookup('env', 'RUSTRAG_FRONTEND_DEPLOY_IMAGE') | default('', true) }}"
    cleanup_volumes: "{{ (lookup('env', 'RUSTRAG_DEPLOY_CLEAN_VOLUMES') | default('false', true)) | bool }}"
    registry_url: "{{ lookup('env', 'CI_REGISTRY') | default('', true) }}"
    registry_user: "{{ lookup('env', 'CI_REGISTRY_USER') | default('', true) }}"
    registry_password: "{{ lookup('env', 'CI_REGISTRY_PASSWORD') | default('', true) }}"
    deploy_become: "{{ (lookup('env', 'DEPLOY_BECOME') | default('false', true)) | bool }}"
    deploy_lock_file: "{{ lookup('env', 'DEPLOY_LOCK_FILE') | default('/var/lock/rustrag-compose-deploy.lock', true) }}"
    compose_cmd:
      - docker
      - compose
      - -p
      - "{{ compose_project }}"
      - --env-file
      - "{{ env_file }}"
      - --env-file
      - "{{ image_env_file }}"
      - -f
      - "{{ compose_file }}"

  become: "{{ deploy_become }}"

  tasks:
    - name: Ensure deploy directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ deploy_path }}"
        - "{{ deploy_path }}/docker"
        - "{{ deploy_path }}/docker/nginx"
        - "{{ deploy_path }}/data"
        - "{{ deploy_path }}/data/postgres"
        - "{{ deploy_path }}/data/arangodb"
        - "{{ deploy_path }}/data/content-storage"

    - name: Sync GitLab compose file to target host
      ansible.builtin.copy:
        src: "{{ ci_project_dir }}/docker-compose-gitlab.yml"
        dest: "{{ compose_file }}"
        mode: "0644"

    - name: Sync docker runtime assets to target host
      ansible.builtin.copy:
        src: "{{ ci_project_dir }}/docker/"
        dest: "{{ deploy_path }}/docker/"
        mode: preserve

    - name: Ensure env file exists on target host
      ansible.builtin.stat:
        path: "{{ env_file }}"
      register: env_file_stat

    - name: Fail when env file is missing on target host
      ansible.builtin.fail:
        msg: ".env not found at {{ env_file }} on target host"
      when: not env_file_stat.stat.exists

    - name: Fail when deploy images are missing
      ansible.builtin.fail:
        msg: "RUSTRAG_BACKEND_DEPLOY_IMAGE and RUSTRAG_FRONTEND_DEPLOY_IMAGE are required"
      when: backend_image | length == 0 or frontend_image | length == 0

    - name: Fail when GitLab registry credentials are missing
      ansible.builtin.fail:
        msg: "CI_REGISTRY / CI_REGISTRY_USER / CI_REGISTRY_PASSWORD are required"
      when: registry_url | length == 0 or registry_user | length == 0 or registry_password | length == 0

    - name: Login host Docker daemon to GitLab registry
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          echo "{{ registry_password }}" | docker login "{{ registry_url }}" -u "{{ registry_user }}" --password-stdin
        executable: /bin/bash
      no_log: true

    - name: Pin backend image tag
      ansible.builtin.lineinfile:
        path: "{{ image_env_file }}"
        regexp: '^RUSTRAG_BACKEND_IMAGE='
        line: "RUSTRAG_BACKEND_IMAGE={{ backend_image }}"
        create: true
        mode: "0600"

    - name: Pin frontend image tag
      ansible.builtin.lineinfile:
        path: "{{ image_env_file }}"
        regexp: '^RUSTRAG_FRONTEND_IMAGE='
        line: "RUSTRAG_FRONTEND_IMAGE={{ frontend_image }}"
        create: true
        mode: "0600"

    - name: Validate compose configuration
      ansible.builtin.command:
        argv: "{{ compose_cmd + ['config', '--services'] }}"
        chdir: "{{ deploy_path }}"
      register: compose_services
      changed_when: false

    - name: Ensure required services are present in compose
      ansible.builtin.assert:
        that:
          - "'backend' in compose_services.stdout_lines"
          - "'frontend' in compose_services.stdout_lines"
          - "'postgres' in compose_services.stdout_lines"
          - "'redis' in compose_services.stdout_lines"
        fail_msg: "Compose file is missing one of required services: backend/frontend/postgres/redis"

    - name: Pull all images for compose stack
      ansible.builtin.command:
        argv: "{{ compose_cmd + ['pull'] }}"
        chdir: "{{ deploy_path }}"

    - name: Optionally reset compose stack with volumes
      ansible.builtin.shell:
        cmd: >-
          flock {{ deploy_lock_file | quote }}
          docker compose
          -p {{ compose_project | quote }}
          --env-file {{ env_file | quote }}
          --env-file {{ image_env_file | quote }}
          -f {{ compose_file | quote }}
          down -v --remove-orphans
        chdir: "{{ deploy_path }}"
        executable: /bin/bash
      when: cleanup_volumes

    - name: Start compose stack
      ansible.builtin.shell:
        cmd: >-
          flock {{ deploy_lock_file | quote }}
          docker compose
          -p {{ compose_project | quote }}
          --env-file {{ env_file | quote }}
          --env-file {{ image_env_file | quote }}
          -f {{ compose_file | quote }}
          up -d --remove-orphans
        chdir: "{{ deploy_path }}"
        executable: /bin/bash

    - name: Show compose status
      ansible.builtin.command:
        argv: "{{ compose_cmd + ['ps'] }}"
        chdir: "{{ deploy_path }}"
      changed_when: false
