name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - github/master
      - "codex/**"

permissions:
  contents: read

jobs:
  repo-shape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce repo shape
        run: python3 scripts/check_repo_shape.py

  backend-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Run backend library tests
        run: cargo test -p ironrag-backend --lib

      - name: Run OpenAPI contract drift tests
        run: cargo test -p ironrag-backend --test greenfield_contracts

      - name: Run contract serde surface tests
        run: cargo test -p ironrag-contracts --test serde_surfaces

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run frontend tests
        working-directory: apps/web
        run: npm test

      - name: Build frontend
        working-directory: apps/web
        run: npm run build
