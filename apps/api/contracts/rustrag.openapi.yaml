  /v1/knowledge/libraries/{libraryId}/search/documents:
    get:
      tags: [knowledge]
      summary: Search documents, chunks, entities, and relations in one knowledge library
      operationId: searchKnowledgeDocuments
      parameters:
        - in: path
          name: libraryId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: query
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 50
        - in: query
          name: chunkHitLimitPerDocument
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 50
        - in: query
          name: evidenceSampleLimit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Hybrid knowledge search response with lexical and vector candidates, document hits, and provenance summaries
          content:
            application/json:
              schema:
                type: object
                required:
                  [
                    libraryId,
                    queryText,
                    limit,
                    embeddingProviderKind,
                    embeddingModelName,
                    embeddingModelCatalogId,
                    freshnessGeneration,
                    documentHits,
                    entityHits,
                    relationHits,
                    vectorChunkHits,
                    vectorEntityHits,
                  ]
                properties:
                  libraryId:
                    type: string
                    format: uuid
                  queryText:
                    type: string
                  limit:
                    type: integer
                    format: int32
                  embeddingProviderKind:
                    type: string
                  embeddingModelName:
                    type: string
                  embeddingModelCatalogId:
                    type: string
                    format: uuid
                  freshnessGeneration:
                    type: integer
                    format: int64
                  documentHits:
                    type: array
                    items:
                      type: object
                      required:
                        [
                          document,
                          revision,
                          score,
                          provenanceSummary,
                          chunkHits,
                          vectorChunkHits,
                          evidenceSamples,
                        ]
                      properties:
                        document:
                          $ref: "#/components/schemas/KnowledgeDocumentRow"
                        revision:
                          $ref: "#/components/schemas/KnowledgeRevisionRow"
                        score:
                          type: number
                          format: double
                        lexicalRank:
                          type:
                            - integer
                            - "null"
                          format: int32
                        vectorRank:
                          type:
                            - integer
                            - "null"
                          format: int32
                        lexicalScore:
                          type:
                            - number
                            - "null"
                          format: double
                        vectorScore:
                          type:
                            - number
                            - "null"
                          format: double
                        chunkHits:
                          type: array
                          items:
                            $ref: "#/components/schemas/KnowledgeChunkSearchRow"
                        vectorChunkHits:
                          type: array
                          items:
                            $ref: "#/components/schemas/KnowledgeChunkVectorSearchRow"
                        evidenceSamples:
                          type: array
                          items:
                            $ref: "#/components/schemas/KnowledgeEvidenceRow"
                        provenanceSummary:
                          type: object
                          required: [supportingEvidenceCount, lexicalChunkCount, vectorChunkCount]
                          properties:
                            supportingEvidenceCount:
                              type: integer
                              format: int32
                            lexicalChunkCount:
                              type: integer
                              format: int32
                            vectorChunkCount:
                              type: integer
                              format: int32
                  entityHits:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeEntitySearchRow"
                  relationHits:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeRelationSearchRow"
                  vectorChunkHits:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeChunkVectorSearchRow"
                  vectorEntityHits:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeEntityVectorSearchRow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
