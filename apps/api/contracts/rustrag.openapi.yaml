openapi: 3.1.0
info:
  title: RustRAG API
  version: 0.1.2
  description: |
    Public HTTP API for the ArangoDB-backed RustRAG API service (`apps/api/src/interfaces/http`).
    Operation paths include the `/v1` prefix. `servers.url` is only the origin (e.g. `/` or `https://api.example.com`).
    Set `RUSTRAG_OPENAPI_PUBLIC_ORIGIN` to that origin; a trailing `/v1` is stripped if present.
servers:
  - url: /
    description: Same origin (paths include /v1)
security:
  - bearerAuth: []
tags:
  - name: system
  - name: catalog
  - name: iam
  - name: ai
  - name: knowledge
  - name: ingest
  - name: search
  - name: query
  - name: runtime
  - name: billing
  - name: ops
  - name: audit
  - name: automation
  - name: admin
  - name: content
x-greenfield-scaffold:
  canonicalPathPrefixes:
    - /v1/catalog
    - /v1/iam
    - /v1/ai
    - /v1/knowledge
    - /v1/content
    - /v1/ingest
    - /v1/search
    - /v1/query
    - /v1/runtime
    - /v1/billing
    - /v1/ops
    - /v1/audit
    - /v1/mcp
  forbiddenLegacyVocabulary:
    - runtime prefix
    - ui prefix
    - mcp memory module
  seededAiCatalog:
    providers: 3
    models: 7
    prices: 12
  freshBootstrapDiscovery:
    - /v1/openapi/rustrag.openapi.yaml
    - /v1/iam/bootstrap/status
    - /v1/iam/bootstrap/setup
    - /v1/iam/bootstrap/claim
  scaffoldStatus: canonical-cutover
paths:
  /v1/health:
    get:
      tags: [system]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/ready:
    get:
      tags: [system]
      summary: Readiness check
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Readiness probe result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /v1/version:
    get:
      tags: [system]
      summary: Service version
      operationId: getVersion
      security: []
      responses:
        "200":
          description: Service version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /v1/openapi/rustrag.openapi.yaml:
    get:
      tags: [system]
      summary: OpenAPI contract discovery
      operationId: getOpenApiContract
      security: []
      responses:
        "200":
          description: Rendered OpenAPI contract for the current public entrypoint
          content:
            application/yaml:
              schema:
                type: string
  /v1/iam/bootstrap/claim:
    post:
      tags: [iam]
      summary: Claim the first administrator for a fresh deployment
      operationId: postBootstrapClaim
      security: []
      description: |
        One-time bootstrap route for destructive fresh deployments. This route is expected to
        succeed exactly once, create the first `iam_principal` plus `iam_user`, and emit one
        canonical `audit_event`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapClaimRequest"
      responses:
        "200":
          description: Bootstrap claim succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapClaimResponse"
        "400":
          description: Invalid bootstrap payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "401":
          description: Invalid bootstrap secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "403":
          description: Bootstrap claim disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "409":
          description: Bootstrap was already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/iam/bootstrap/status:
    get:
      tags: [iam]
      summary: Resolve whether first-run admin setup is still required
      operationId: getBootstrapStatus
      security: []
      responses:
        "200":
          description: Bootstrap setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapStatusResponse"
  /v1/iam/bootstrap/setup:
    post:
      tags: [iam]
      summary: Configure the first administrator interactively
      operationId: postBootstrapSetup
      security: []
      description: |
        One-time interactive setup route for a fresh deployment with no administrator and no
        explicit bootstrap admin credentials configured through environment variables.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapSetupRequest"
      responses:
        "200":
          description: Bootstrap setup succeeded and created a browser session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          description: Invalid bootstrap payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "403":
          description: Interactive bootstrap setup is disabled by configured environment credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "409":
          description: Bootstrap was already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/mcp:
    post:
      tags: [automation]
      summary: MCP JSON-RPC endpoint for canonical agent memory flows
      operationId: postMcpRequest
      description: |
        Bearer-token authenticated JSON-RPC transport for discovery, search, read, and document
        mutation tools. Tool visibility and callable actions are derived from the authenticated
        principal's typed grants.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/McpJsonRpcRequest"
      responses:
        "200":
          description: JSON-RPC response envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpJsonRpcResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/mcp/capabilities:
    get:
      tags: [automation]
      summary: Return the derived MCP capability snapshot for the current principal
      operationId: getMcpCapabilities
      responses:
        "200":
          description: Derived capability snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpCapabilitySnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/admin/surface:
    get:
      tags: [admin]
      summary: Return the canonical admin surface snapshot
      operationId: getAdminSurface
      responses:
        "200":
          description: Admin surface summary for navigation, capability gates, and metadata
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/catalog/workspaces:
    get:
      tags: [catalog]
      summary: List visible workspaces
      operationId: listCatalogWorkspaces
      responses:
        "200":
          description: Visible workspaces for the authenticated principal
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogWorkspaceResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
    post:
      tags: [catalog]
      summary: Create a workspace
      operationId: createCatalogWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCatalogWorkspaceRequest"
      responses:
        "200":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogWorkspaceResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "409":
          description: Workspace slug conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/catalog/workspaces/{workspaceId}:
    get:
      tags: [catalog]
      summary: Get one visible workspace
      operationId: getCatalogWorkspace
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogWorkspaceResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
    delete:
      tags: [catalog]
      summary: Delete one workspace
      operationId: deleteCatalogWorkspace
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Workspace deleted
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/catalog/workspaces/{workspaceId}/libraries:
    get:
      tags: [catalog]
      summary: List visible libraries in one workspace
      operationId: listCatalogLibraries
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Libraries visible in the workspace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogLibraryResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
    post:
      tags: [catalog]
      summary: Create a library in one workspace
      operationId: createCatalogLibrary
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCatalogLibraryRequest"
      responses:
        "200":
          description: Created library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogLibraryResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "409":
          description: Library slug conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/catalog/workspaces/{workspaceId}/libraries/{libraryId}:
    delete:
      tags: [catalog]
      summary: Delete one library from one workspace
      operationId: deleteCatalogLibrary
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: libraryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Library deleted
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/catalog/libraries/{libraryId}:
    get:
      tags: [catalog]
      summary: Get one visible library
      operationId: getCatalogLibrary
      parameters:
        - in: path
          name: libraryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Library details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogLibraryResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/iam/session/login:
    post:
      tags: [iam]
      summary: Authenticate a browser session with login and password
      operationId: loginIamSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginSessionRequest"
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/iam/session:
    get:
      tags: [iam]
      summary: Resolve the current browser session
      operationId: getIamSession
      responses:
        "200":
          description: Current browser session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid browser session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/iam/session/logout:
    post:
      tags: [iam]
      summary: Revoke the current browser session
      operationId: logoutIamSession
      responses:
        "204":
          description: Session revoked
        "401":
          description: Missing or invalid browser session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/iam/me:
    get:
      tags: [iam]
      summary: Resolve the current principal, memberships, and effective grants
      operationId: getIamMe
      responses:
        "200":
          description: Canonical principal view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/iam/tokens:
    get:
      tags: [iam]
      summary: List visible API tokens
      operationId: listIamTokens
      parameters:
        - in: query
          name: workspaceId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: API tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
    post:
      tags: [iam]
      summary: Mint a canonical API token
      operationId: mintIamToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MintTokenRequest"
      responses:
        "200":
          description: Minted token and persisted API token record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MintTokenResponse"
        "400":
          description: Invalid token payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/iam/tokens/{tokenPrincipalId}/revoke:
    post:
      tags: [iam]
      summary: Revoke one API token principal
      operationId: revokeIamToken
      parameters:
        - in: path
          name: tokenPrincipalId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Token revoked
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/iam/grants:
    get:
      tags: [iam]
      summary: List effective grants for one principal
      operationId: listIamGrants
      parameters:
        - in: query
          name: principalId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Effective grants for the requested principal
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrantResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
    post:
      tags: [iam]
      summary: Create a typed grant
      operationId: createIamGrant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrantRequest"
      responses:
        "200":
          description: Grant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantResponse"
        "400":
          description: Invalid grant payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/iam/grants/{grantId}:
    delete:
      tags: [iam]
      summary: Revoke one typed grant
      operationId: revokeIamGrant
      parameters:
        - in: path
          name: grantId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Grant revoked
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "404":
          description: Grant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/ai/providers:
    get:
      tags: [ai]
      summary: List seeded AI providers
      operationId: listAiProviders
      responses:
        "200":
          description: AI provider catalog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderCatalogEntryResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/ai/models:
    get:
      tags: [ai]
      summary: List seeded AI models
      operationId: listAiModels
      parameters:
        - in: query
          name: providerCatalogId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: AI model catalog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelCatalogEntryResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/ai/model-presets:
    get:
      tags: [ai]
      summary: List workspace model presets
      operationId: listAiModelPresets
      parameters:
        - in: query
          name: workspaceId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace model presets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelPresetResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/ai/prices:
    get:
      tags: [ai]
      summary: List seeded AI prices
      operationId: listAiPrices
      parameters:
        - in: query
          name: modelCatalogId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: workspaceId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: AI price catalog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceCatalogEntryResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/ai/credentials:
    get:
      tags: [ai]
      summary: List visible provider credentials for one workspace
      operationId: listAiCredentials
      parameters:
        - in: query
          name: workspaceId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Provider credentials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderCredentialResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
    post:
      tags: [ai]
      summary: Create a provider credential
      operationId: createAiCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderCredentialRequest"
      responses:
        "200":
          description: Provider credential created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialResponse"
        "400":
          description: Invalid provider credential payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/ai/libraries/{libraryId}/bindings:
    get:
      tags: [ai]
      summary: List active model bindings for one library
      operationId: listAiLibraryBindings
      parameters:
        - in: path
          name: libraryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Active library model bindings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryModelBindingResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/ai/library-bindings:
    post:
      tags: [ai]
      summary: Create or replace the active binding for one library purpose
      operationId: createAiLibraryBinding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLibraryBindingRequest"
      responses:
        "200":
          description: Library model binding created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryModelBindingResponse"
        "400":
          description: Invalid library binding payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/ai/library-bindings/{bindingId}:
    put:
      tags: [ai]
      summary: Update one existing library binding
      operationId: updateAiLibraryBinding
      parameters:
        - in: path
          name: bindingId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLibraryBindingRequest"
      responses:
        "200":
          description: Library model binding updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryModelBindingResponse"
        "400":
          description: Invalid library binding payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "404":
