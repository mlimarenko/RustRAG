repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-toml
      - id: detect-private-key
  - repo: local
    hooks:
      - id: max-lines
        name: max-lines
        entry: scripts/pre-commit/check-max-lines.sh
        language: system
        pass_filenames: true
      - id: backend-fmt
        name: backend-fmt
        entry: bash -lc 'cargo fmt --all'
        language: system
        pass_filenames: false
      - id: backend-lint
        name: backend-lint
        entry: bash -lc 'CARGO_TARGET_DIR=.cargo-target/api cargo clippy -p ironrag-backend --all-targets -- -D warnings'
        language: system
        pass_filenames: false
