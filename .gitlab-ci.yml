include:
  - project: "General/Templates"
    file: "/docker-builds/docker.gitlab-ci.yml"

workflow:
  rules:
    - if: $CI_COMMIT_TAG || $CI_MERGE_REQUEST_EVENT_TYPE
      when: never
    - if: '$CI_COMMIT_REF_NAME =~ /^(develop|master|release\/.+|feature\/.+|hotfix\/.+)$/'
      when: always
    - when: never

variables:
  CI_VALIDATE_REPO: "false"
  EXPORT_VAULT_VARS: "false"
  ANSIBLE_HOST_KEY_CHECKING: "False"
  DEPLOY_BECOME: "false"
  DEPLOY_HOST: "10.0.1.109"
  DEPLOY_PATH: "/opt/docker/rustrag"
  DEPLOY_PORT: "22"
  DEPLOY_USER: "root"
  APP_COMPOSE_PROJECT: "rustrag"
  BACKEND_IMAGE_NAME: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE_NAME: "$CI_REGISTRY_IMAGE/frontend"
  RUSTRAG_DEPLOY_CLEAN_VOLUMES: "false"

get version:
  extends: .get_version
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^(develop|master|release\/.+|feature\/.+|hotfix\/.+)$/'
      when: on_success
    - when: never
  script:
    - |
      case "$CI_COMMIT_REF_NAME" in
        master) export CI_VERSION_TAG="prod" ;;
        release/*) export CI_VERSION_TAG="release" ;;
        *) export CI_VERSION_TAG="dev" ;;
      esac
      export CI_VERSION="0.1.0"
      export CI_BUILD_CODE="${CI_PIPELINE_IID}"
      if [[ "$CI_COMMIT_REF_NAME" =~ ^release/ ]]; then
        CI_VERSION_FULL="${CI_VERSION}-${CI_VERSION_TAG}"
      else
        CI_VERSION_FULL="${CI_VERSION}-${CI_VERSION_TAG}-${CI_BUILD_CODE}"
      fi
      echo "Using version ${CI_VERSION_FULL}"
      cat <<ENV > "$CI_PROJECT_DIR/version.env"
      CI_VERSION=$CI_VERSION
      CI_VERSION_TAG=$CI_VERSION_TAG
      CI_VERSION_FULL=$CI_VERSION_FULL
      CI_BUILD_CODE=$CI_BUILD_CODE
      BACKEND_DEPLOY_IMAGE=${BACKEND_IMAGE_NAME}:${CI_VERSION_FULL}
      FRONTEND_DEPLOY_IMAGE=${FRONTEND_IMAGE_NAME}:${CI_VERSION_FULL}
      ENV
  artifacts:
    reports:
      dotenv: version.env

backend build:
  extends: .build
  rules:
    - if: '$CI_COMMIT_REF_NAME == "develop"'
      when: on_success
    - when: never
  needs:
    - job: get version
  variables:
    DOCKER_DEFAULT_CONTEXT: "."
    DOCKER_FILE: "backend/Dockerfile"
    DOCKER_IMAGE_NAME: "$BACKEND_IMAGE_NAME"
    DOCKER_ARGS: ""

frontend build:
  extends: .build
  rules:
    - if: '$CI_COMMIT_REF_NAME == "develop"'
      when: on_success
    - when: never
  needs:
    - job: get version
  variables:
    DOCKER_DEFAULT_CONTEXT: "frontend"
    DOCKER_FILE: "frontend/Dockerfile"
    DOCKER_IMAGE_NAME: "$FRONTEND_IMAGE_NAME"
    DOCKER_ARGS: ""

compose deploy:
  stage: deploy
  image: gitlab.piping.space:4567/general/devopsimage:latest
  tags: [pxm-docker01_shell]
  resource_group: rustrag-deploy
  rules:
    - if: '$CI_COMMIT_REF_NAME == "develop"'
  needs:
    - job: backend build
    - job: frontend build
    - job: get version
  before_script:
    - command -v docker >/dev/null || (echo "docker is required on pxm-docker01_shell" && exit 1)
    - test -n "$SSH_PRIVATE_KEY_B64" || (echo "SSH_PRIVATE_KEY_B64 is required" && exit 1)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY_B64" | tr -d '\r' | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - |
      cat > ~/.ssh/config <<'CFG'
      Host *
        IdentityFile ~/.ssh/id_ed25519
        IdentitiesOnly yes
        IdentityAgent none
        StrictHostKeyChecking no
      CFG
    - chmod 600 ~/.ssh/config
  script:
    - export RUSTRAG_BACKEND_DEPLOY_IMAGE="$BACKEND_DEPLOY_IMAGE"
    - export RUSTRAG_FRONTEND_DEPLOY_IMAGE="$FRONTEND_DEPLOY_IMAGE"
    - unset SSH_AUTH_SOCK
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - |
      docker run --rm --network host \
        --entrypoint /bin/sh \
        -v "$CI_PROJECT_DIR:/workspace" \
        -w /workspace \
        -e ANSIBLE_HOST_KEY_CHECKING \
        -e APP_COMPOSE_PROJECT \
        -e CI_PROJECT_DIR=/workspace \
        -e CI_REGISTRY \
        -e CI_REGISTRY_PASSWORD \
        -e CI_REGISTRY_USER \
        -e DEPLOY_BECOME \
        -e DEPLOY_HOST \
        -e DEPLOY_LOCK_FILE \
        -e DEPLOY_PATH \
        -e DEPLOY_PORT \
        -e DEPLOY_USER \
        -e RUSTRAG_BACKEND_DEPLOY_IMAGE \
        -e RUSTRAG_DEPLOY_CLEAN_VOLUMES \
        -e RUSTRAG_FRONTEND_DEPLOY_IMAGE \
        -e SSH_PRIVATE_KEY_B64 \
        gitlab.piping.space:4567/general/devopsimage:latest \
        -xec '
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | tr -d "\r" | base64 -d >/root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519
          printf "%s\n" \
            "Host *" \
            "  IdentityFile /root/.ssh/id_ed25519" \
            "  IdentitiesOnly yes" \
            "  IdentityAgent none" \
            "  StrictHostKeyChecking no" \
            >/root/.ssh/config
          chmod 600 /root/.ssh/config
          ansible-playbook \
            -i "${DEPLOY_HOST}," \
            ansible/deploy.yml \
            -u "$DEPLOY_USER" \
            --private-key /root/.ssh/id_ed25519 \
            -e "ansible_port=${DEPLOY_PORT}"
        '
    - |
      ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" /bin/bash <<EOF
      set -euo pipefail
      cd "$DEPLOY_PATH"
      grep -Fxq "RUSTRAG_BACKEND_IMAGE=$RUSTRAG_BACKEND_DEPLOY_IMAGE" .images.env
      grep -Fxq "RUSTRAG_FRONTEND_IMAGE=$RUSTRAG_FRONTEND_DEPLOY_IMAGE" .images.env
      source ./.env
      for _ in {1..30}; do
        if curl -fsS "http://127.0.0.1:\${RUSTRAG_FRONTEND_PORT:-13000}/health" >/dev/null \
          && curl -fsS "http://127.0.0.1:\${RUSTRAG_BACKEND_PORT:-18080}/v1/ready" >/dev/null; then
          docker compose -p "$APP_COMPOSE_PROJECT" --env-file .env --env-file .images.env -f docker-compose-gitlab.yml ps
          exit 0
        fi
        sleep 2
      done
      docker compose -p "$APP_COMPOSE_PROJECT" --env-file .env --env-file .images.env -f docker-compose-gitlab.yml ps -a
      exit 1
      EOF

grounded benchmark:
  stage: deploy
  image: python:3.13-slim
  tags: [pxm-docker01_shell]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_REF_NAME == "develop"'
      when: on_success
    - if: '$CI_COMMIT_REF_NAME == "develop"'
      when: manual
      allow_failure: true
    - when: never
  needs:
    - job: compose deploy
  before_script:
    - python -m pip install --no-cache-dir requests
  script:
    - test -n "$RUSTRAG_BENCHMARK_BASE_URL" || (echo "RUSTRAG_BENCHMARK_BASE_URL is required" && exit 1)
    - test -n "$RUSTRAG_BENCHMARK_SESSION_COOKIE" || (echo "RUSTRAG_BENCHMARK_SESSION_COOKIE is required" && exit 1)
    - test -n "$RUSTRAG_BENCHMARK_WORKSPACE_ID" || (echo "RUSTRAG_BENCHMARK_WORKSPACE_ID is required" && exit 1)
    - export RUSTRAG_SESSION_COOKIE="$RUSTRAG_BENCHMARK_SESSION_COOKIE"
    - export RUSTRAG_BENCHMARK_OUTPUT_DIR="tmp-grounded-benchmarks"
    - export RUSTRAG_BENCHMARK_SUITES="${RUSTRAG_BENCHMARK_SUITES:-backend/benchmarks/grounded_query/api_baseline_suite.json backend/benchmarks/grounded_query/workflow_strict_suite.json backend/benchmarks/grounded_query/layout_noise_suite.json backend/benchmarks/grounded_query/graph_multihop_suite.json}"
    - make benchmark-grounded-all
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - tmp-grounded-benchmarks/
