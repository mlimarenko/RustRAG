resolver 127.0.0.11 valid=30s ipv6=off;
resolver_timeout 5s;

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream backend_upstream {
  zone backend_upstream 64k;
  server backend:8080 resolve;
  keepalive 32;
}

upstream frontend_upstream {
  zone frontend_upstream 64k;
  server frontend:80 resolve;
  keepalive 16;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 100M;

  location = /health {
    access_log off;
    proxy_pass http://backend_upstream/v1/ready;
    proxy_set_header Host $host;
  }

  location ^~ /mcp {
    return 308 $scheme://$http_host/v1$request_uri;
  }

  location /v1/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_pass http://backend_upstream;
  }

  # All other traffic proxied to frontend container
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_pass http://frontend_upstream;
  }
}
