{{- if eq .Values.dependencies.redis.mode "bundled" }}
{{- if .Values.dependencies.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ironrag.fullname" . }}-redis
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.dependencies.redis.persistence.size }}
  {{- with .Values.dependencies.redis.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ironrag.fullname" . }}-redis
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  {{- if .Values.dependencies.redis.persistence.enabled }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  {{- end }}
  selector:
    matchLabels:
      {{- include "ironrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "ironrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: redis
          image: "{{ .Values.dependencies.redis.image.repository }}:{{ .Values.dependencies.redis.image.tag }}"
          imagePullPolicy: {{ .Values.dependencies.redis.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              name: tcp
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- if .Values.dependencies.redis.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          resources:
            {{- toYaml .Values.dependencies.redis.resources | nindent 12 }}
      {{- if .Values.dependencies.redis.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ironrag.fullname" . }}-redis
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ironrag.fullname" . }}-redis
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  selector:
    {{- include "ironrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: tcp
      port: {{ .Values.dependencies.redis.port }}
      targetPort: tcp
{{- end }}
