{{- if eq .Values.dependencies.postgres.mode "bundled" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ironrag.fullname" . }}-postgres
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.dependencies.postgres.persistence.size }}
  {{- with .Values.dependencies.postgres.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ironrag.fullname" . }}-postgres
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      {{- include "ironrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "ironrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: "{{ .Values.dependencies.postgres.image.repository }}:{{ .Values.dependencies.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.dependencies.postgres.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: POSTGRES_DB
              value: {{ .Values.dependencies.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.dependencies.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.dependencies.postgres.password | quote }}
          ports:
            - containerPort: 5432
              name: tcp
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          resources:
            {{- toYaml .Values.dependencies.postgres.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ironrag.fullname" . }}-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ironrag.fullname" . }}-postgres
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    {{- include "ironrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: tcp
      port: {{ .Values.dependencies.postgres.port }}
      targetPort: tcp
{{- end }}
