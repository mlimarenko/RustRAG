{{- if eq .Values.startup.mode "startup_job" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ironrag.fullname" . }}-startup-wait
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ironrag.fullname" . }}-startup-wait
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ironrag.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ironrag.fullname" . }}-startup-wait
{{- end }}
